<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#667eea" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- FP32 block -->
  <rect x="80" y="200" width="220" height="80" rx="12" fill="none" stroke="#667eea" stroke-width="2" opacity="0.5"/>
  <text x="190" y="230" text-anchor="middle" fill="#667eea" font-family="monospace" font-size="14" opacity="0.7">FP32</text>
  <text x="190" y="258" text-anchor="middle" fill="#e5e5e5" font-family="monospace" font-size="20">0.40  0.79  1.22</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="240" x2="400" y2="240" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#764ba2"/></marker></defs>

  <!-- INT4 block -->
  <rect x="420" y="200" width="220" height="80" rx="12" fill="none" stroke="#764ba2" stroke-width="2" opacity="0.7"/>
  <text x="530" y="230" text-anchor="middle" fill="#764ba2" font-family="monospace" font-size="14" opacity="0.7">INT4</text>
  <text x="530" y="258" text-anchor="middle" fill="#e5e5e5" font-family="monospace" font-size="24" font-weight="bold">0  7  15</text>

  <!-- Arrow 2 -->
  <line x1="660" y1="240" x2="740" y2="240" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Dequantized block -->
  <rect x="760" y="200" width="260" height="80" rx="12" fill="none" stroke="#03dac6" stroke-width="2" opacity="0.5"/>
  <text x="890" y="230" text-anchor="middle" fill="#03dac6" font-family="monospace" font-size="14" opacity="0.7">Dequantized</text>
  <text x="890" y="258" text-anchor="middle" fill="#e5e5e5" font-family="monospace" font-size="20">0.40  0.78  1.22</text>

  <!-- Size comparison bars -->
  <rect x="80" y="340" width="400" height="28" rx="6" fill="#667eea" opacity="0.3"/>
  <rect x="80" y="340" width="400" height="28" rx="6" fill="url(#accent)" opacity="0.6"/>
  <text x="90" y="360" fill="#fff" font-family="sans-serif" font-size="14" font-weight="600">FP16: 14 GB</text>

  <rect x="80" y="380" width="120" height="28" rx="6" fill="#03dac6" opacity="0.4"/>
  <text x="90" y="400" fill="#fff" font-family="sans-serif" font-size="14" font-weight="600">INT4: 3.5 GB</text>

  <!-- Labels -->
  <text x="520" y="360" fill="#888" font-family="sans-serif" font-size="13">GPTQ</text>
  <rect x="570" y="346" width="8" height="18" rx="3" fill="#667eea"/>
  <text x="600" y="360" fill="#888" font-family="sans-serif" font-size="13">AWQ</text>
  <rect x="645" y="346" width="8" height="18" rx="3" fill="#764ba2"/>
  <text x="672" y="360" fill="#888" font-family="sans-serif" font-size="13">GGUF</text>
  <rect x="720" y="346" width="8" height="18" rx="3" fill="#03dac6"/>

  <!-- Title -->
  <text x="600" y="500" text-anchor="middle" fill="#e5e5e5" font-family="sans-serif" font-size="42" font-weight="800" letter-spacing="-1">LLM Quantization</text>
  <text x="600" y="545" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="20">GPTQ  ·  AWQ  ·  GGUF</text>

  <!-- Author -->
  <text x="600" y="590" text-anchor="middle" fill="#667eea" font-family="sans-serif" font-size="15" font-weight="600">Samson Kinyanjui</text>
</svg>
